services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diagram_db_api
    working_dir: /app
    ports:
      - "3000:3000"
    command: npm run dev:node
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - STORAGE=postgres
      - DATABASE_URL=postgresql://admin:password@db:5432/diagram_db
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diagram_db_web
    working_dir: /app
    ports:
      - "5173:5173"
    command: npm --workspace apps/web run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - API_PROXY_TARGET=http://api:3000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    container_name: diagram_db_postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=diagram_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d diagram_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  node_modules:
